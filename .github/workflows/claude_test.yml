name: Claude Test Run

on:
  workflow_dispatch:
    # optional input removed temporarily to avoid YAML parsing issues

jobs:
  run-claude-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Call Claude
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_API_URL: https://api.anthropic.com/v1/complete
        run: |
          python backend/scripts/claude_test.py
